# =============================================================================
#  Lab Bitcoin · Sesión 2 · Módulo 5 · UMA · 2026
# -----------------------------------------------------------------------------
#  Arranca:
#    · 16 contenedores de alumno  (alumno-01 ... alumno-16)
#    · 2 contenedores de instructor (minero-azul, minero-rojo)
#
#  Conectados a la red bridge "blocknet" (172.20.0.0/16).
#
#  Acceso SSH desde el host (o desde fuera de la VM si el firewall lo permite):
#      ssh alumno@<vm> -p 6115X        # alumno-0X  → 61150+X
#      ssh alumno@<vm> -p 61170        # minero-azul
#      ssh alumno@<vm> -p 61171        # minero-rojo
#      contraseña: bitcoin
# =============================================================================

name: bitcoin-lab

# -----------------------------------------------------------------------------
# Red compartida del aula
# -----------------------------------------------------------------------------
networks:
  blocknet:
    name: blocknet
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

# -----------------------------------------------------------------------------
# Volúmenes nombrados — uno por contenedor, para que el regtest de cada
# alumno persista entre restarts (`docker compose restart alumno-02` no les
# tira su trabajo).  `docker compose down -v` los elimina.
# -----------------------------------------------------------------------------
volumes:
  alumno-01-data:
  alumno-02-data:
  alumno-03-data:
  alumno-04-data:
  alumno-05-data:
  alumno-06-data:
  alumno-07-data:
  alumno-08-data:
  alumno-09-data:
  alumno-10-data:
  alumno-11-data:
  alumno-12-data:
  alumno-13-data:
  alumno-14-data:
  alumno-15-data:
  alumno-16-data:
  minero-azul-data:
  minero-rojo-data:

# -----------------------------------------------------------------------------
# Anchor YAML para no repetir los campos de build / defaults en cada servicio.
# Las variables de entorno compartidas viven en `blocknet.env` y se inyectan
# con `env_file:`
# -----------------------------------------------------------------------------
x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
  image: bitcoin-lab:latest
  restart: unless-stopped
  networks:
    - blocknet
  env_file:
    - blocknet.env

# -----------------------------------------------------------------------------
# Servicios
# -----------------------------------------------------------------------------
services:

  # ------------------------------- ALUMNOS -----------------------------------
  alumno-01:
    <<: *common
    container_name: alumno-01
    hostname: alumno-01
    ports:
      - "61151:22"
    volumes:
      - alumno-01-data:/home/alumno/.bitcoin

